openapi: 3.1.0
info:
  title: hermes-bridge
  description: Mobile-ready HTTP bridge for hermes-agent.
  version: 0.1.0
paths:
  /health:
    get:
      summary: Health
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/chat/completions:
    post:
      summary: Chat Completions
      operationId: chat_completions_api_chat_completions_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/status:
    get:
      summary: Status Proxy
      operationId: status_proxy_api_status_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/model/info:
    get:
      summary: Model Info
      operationId: model_info_api_model_info_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/config:
    get:
      summary: Get Config
      operationId: get_config_api_config_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
    put:
      summary: Put Config
      operationId: put_config_api_config_put
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/config/schema:
    get:
      summary: Config Schema
      operationId: config_schema_api_config_schema_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/config/defaults:
    get:
      summary: Config Defaults
      operationId: config_defaults_api_config_defaults_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/env:
    get:
      summary: Get Env
      operationId: get_env_api_env_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
    put:
      summary: Put Env
      operationId: put_env_api_env_put
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
    delete:
      summary: Delete Env
      operationId: delete_env_api_env_delete
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/env/reveal:
    post:
      summary: Reveal Env
      operationId: reveal_env_api_env_reveal_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/sessions:
    get:
      summary: List Sessions
      operationId: list_sessions_api_sessions_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/sessions/search:
    get:
      summary: Search Sessions
      operationId: search_sessions_api_sessions_search_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/sessions/{session_id}:
    get:
      summary: Get Session
      operationId: get_session_api_sessions__session_id__get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      summary: Delete Session
      operationId: delete_session_api_sessions__session_id__delete
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/sessions/{session_id}/messages:
    get:
      summary: Get Session Messages
      operationId: get_session_messages_api_sessions__session_id__messages_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/gateway/start:
    post:
      summary: Gateway Start
      operationId: gateway_start_api_gateway_start_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/gateway/stop:
    post:
      summary: Gateway Stop
      operationId: gateway_stop_api_gateway_stop_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/gateway/restart:
    post:
      summary: Gateway Restart
      operationId: gateway_restart_api_gateway_restart_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError

